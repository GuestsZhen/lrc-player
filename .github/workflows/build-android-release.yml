name: Build and Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web assets
        run: npm run build

      - name: Sync to Android
        run: |
          # 确保 capacitor.config.json 使用正确的 webDir
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.lrcplayer.app",
            "appName": "LRC Player",
            "webDir": "build",
            "server": {
              "androidScheme": "https",
              "cleartext": false
            },
            "android": {
              "allowMixedContent": false,
              "captureInput": true,
              "webContentsDebuggingEnabled": true
            }
          }
          EOF
          npx cap sync android
          python3 scripts/register-mediastore-plugin.py

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/lrc-player.keystore

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/lrc-player.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 📱 LRC Player v6.0.6
            
            ### ⚠️ 首次使用必读
            
            安装后请按照以下步骤授予权限：
            
            1. **打开应用** → 会自动请求权限
            2. **允许存储权限** → 点击“允许”
            3. **如果找不到音频文件**：
               - 进入手机 **设置** → **应用** → **LRC Player** → **权限**
               - 允许 **“音乐和音频”** 或 **“文件和媒体”** 权限
               - Android 11+ 还需要允许 **“所有文件访问”** 权限
            
            ### 🔧 通过 ADB 授予权限（可选）
            
            ```bash
            # 连接手机后执行
            adb shell pm grant com.lrcplayer.app android.permission.READ_MEDIA_AUDIO
            adb shell appops set com.lrcplayer.app MANAGE_EXTERNAL_STORAGE allow
            ```
            
            ### ✨ 本次更新
            
            - 修复 Android 版本音频文件扫描问题
            - 优化 MediaStore 插件注册流程
            - 改进权限请求逻辑
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
