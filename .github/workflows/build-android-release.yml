name: Build and Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        uses: pnpm/action-setup@v3
        with:
          run_install: |
            - args: [--frozen-lockfile, --strict-peer-dependencies]

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Web assets
        run: npm run build

      - name: Sync to Android
        run: |
          # 确保 capacitor.config.json 使用正确的 webDir
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.lrcplayer.app",
            "appName": "LRC Player",
            "webDir": "build",
            "server": {
              "androidScheme": "https",
              "cleartext": false
            },
            "android": {
              "allowMixedContent": false,
              "captureInput": true,
              "webContentsDebuggingEnabled": true
            }
          }
          EOF
          npx cap sync android
          python3 scripts/register-mediastore-plugin.py

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/lrc-player.keystore

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/lrc-player.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Get version from package.json
        if: startsWith(github.ref, 'refs/tags/v')
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 💝 支持项目 / Support the Project
                  
            如果你觉得这个项目对你有帮助，欢迎请作者喝杯咖啡 ☕
                  
            If you find this project helpful, consider buying me a cup of coffee!
                  
            <div align="center">
            <table>
            <tr>
            <td align="center">
            <img src="https://raw.githubusercontent.com/GuestsZhen/lrc-player/main/public/images/Guests-Alipay.png" alt="支付宝 Alipay" width="200"/><br/>
            <strong>支付宝 / Alipay</strong>
            </td>
            <td align="center">
            <img src="https://raw.githubusercontent.com/GuestsZhen/lrc-player/main/public/images/Guests-WX.png" alt="微信支付 WeChat Pay" width="200"/><br/>
            <strong>微信支付 / WeChat Pay</strong>
            </td>
            </tr>
            </table>
            </div>
                  
            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
